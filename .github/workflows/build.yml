name: Build slmodemd

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_32BIT: "1"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: |
          docker build -f .github/docker/release.Dockerfile -t slmodemd-ci-build:latest .

      - name: Build and test in container
        run: |
          docker run --rm \
            -e FORCE_32BIT="${FORCE_32BIT}" \
            -v "$PWD":/src \
            -w /src \
            slmodemd-ci-build:latest \
            bash -lc "make clean && make"

      - name: Verify binaries
        run: |
          file slmodemd/slmodemd
          # slmodemd is expected to be 32-bit (Intel 80386)
          file slmodemd/slmodemd | grep -q "32-bit" || exit 1

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp slmodemd/slmodemd dist/slmodemd-linux-i386
          sha256sum dist/slmodemd-linux-i386 > dist/sha256sums.txt

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/slmodemd-linux-i386
            dist/sha256sums.txt
          generate_release_notes: true
